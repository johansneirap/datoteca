version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # core y cl no tienen dependencias de runtime propias (solo @datoteca/core
      # como dependencia interna vía workspace:*, que Dependabot no versiona).
      # Este grupo queda listo para cuando se agregue alguna dependencia de producción.
      production-dependencies:
        dependency-type: "production"
      dev-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: "scope"
