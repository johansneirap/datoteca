name: Bug report
description: Reporta un comportamiento incorrecto en @datoteca/core o @datoteca/cl
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un bug. Completa la mayor cantidad de campos posible — ayuda a reproducirlo más rápido.

  - type: dropdown
    id: package
    attributes:
      label: Paquete afectado
      options:
        - "@datoteca/cl"
        - "@datoteca/core"
        - No estoy seguro
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión del paquete
      description: Versión exacta instalada (ver package.json o `npm ls @datoteca/cl`)
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Código mínimo que reproduce el problema, incluyendo la seed usada si aplica
      placeholder: |
        import { Datoteca } from '@datoteca/cl';

        const dl = new Datoteca({ seed: 123 });
        dl.rut({ format: 'dots' });
      render: ts
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
      description: Incluye el output real, mensaje de error o stack trace completo si aplica
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Versión de Node
      description: Salida de `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Sistema operativo
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Cualquier otra información relevante (opcional)
    validations:
      required: false
